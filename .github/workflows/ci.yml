name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          python -m compileall manusift tests evals
      - name: Test (public CI subset)
        # Full local suite is large and includes Windows-only,
        # private-corpus, and experimental detectors. CI runs a
        # green, third-party-reproducible subset plus install smoke.
        # Expand deliberately as remaining failures are fixed.
        run: |
          python -m pytest -q \
            tests/test_install_smoke.py \
            tests/test_phase_a_safe_read.py \
            tests/test_phase_b_safe_read_b.py \
            tests/test_phase_c_xlsx_figs.py \
            tests/test_phase_d_per_fig_detector.py \
            tests/test_p0_a1c3_image_size.py \
            tests/test_p1_b2_protected_dir.py \
            tests/test_p1_c1_image_forensics_oom.py \
            tests/test_p1_c2_panel_dup_progress.py \
            tests/test_auto_discover_source_data.py \
            tests/test_direct_fs.py \
            tests/test_phase1_p17_direct_fs_error_kinds.py \
            tests/test_progress_endpoint.py \
            tests/test_p2_p3_redundancy.py \
            tests/test_gel_vertical_seam.py \
            tests/test_detector_layers_doc.py \
            tests/test_loading_control_roi.py
      - name: Eval suite
        run: |
          manusift-evals
          manusift-evals-e2e

  audit:
    runs-on: ubuntu-latest
    # Only audit on push to main — PRs already get tested
    # above, and pip-audit hits the OSV DB which has rate
    # limits we should not waste on every PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"
      - name: Vulnerability scan
        # Editable local package is not on PyPI. Freeze third-party
        # deps only, then audit that requirements file.
        run: |
          pip freeze --exclude-editable > /tmp/manusift-deps.txt
          pip-audit -r /tmp/manusift-deps.txt --strict

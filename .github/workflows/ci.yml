name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          python -m compileall manusift tests evals
      - name: Test
        run: |
          python -m pytest -q
      - name: Eval suite
        run: |
          manusift-evals
          manusift-evals-e2e

  audit:
    runs-on: ubuntu-latest
    # Only audit on push to main — PRs already get tested
    # above, and pip-audit hits the OSV DB which has rate
    # limits we should not waste on every PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"
      - name: Vulnerability scan
        # ``--strict`` makes the run non-zero when there
        # are any known-vulnerable deps in the install
        # set. ``--no-deps`` would skip transitive deps
        # and is intentionally not used.
        run: |
          pip-audit --strict

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>manusift-chat visual terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      color: #d4d4d4;
      font-family: 'Cascadia Mono', 'Consolas', monospace;
    }
    #terminal {
      position: absolute;
      inset: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    const term = new Terminal({
      cols: 100,
      rows: 30,
      fontFamily: 'Cascadia Mono, Consolas, monospace',
      fontSize: 14,
      theme: {
        background: '#0e0e0e',
        foreground: '#d4d4d4',
        cursor: '#d4d4d4',
        selectionBackground: '#264f78',
      },
    });
    term.open(document.getElementById('terminal'));
    term.fit();
    window.term = term;
    window.write = (s) => term.write(s);
  </script>
</body>
</html>
